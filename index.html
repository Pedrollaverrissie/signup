<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>login-page</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="script.js">
</head>
<body>
 <div class="signup-page">
   <div class="login-header">
        <div class="top2">
            <div class="login-logo"><img src="images/images (1).jfif" alt=""></div>
            <div class="web-name">
                <h3>DOLLAR MINE</h3>
                <p>Sign up a new account</p>
            </div>
        </div>
            <div class="notice2">
                 <img class="admin" src="images/admin.jfif" alt="">
                    <p>Invented by <span>Admin</span></p>
            </div>
   </div>      
    <div class="identity">
        <label for="">Username <span class="bracket"></span></label>
        <input type="text" placeholder="Your display name">

        <label for="">Email</label>
        <input type="email" placeholder="yourname@gmail.com">

        <label for="">Phone number</label>
        <input type="text" placeholder="07xxxxxxxx">
        <label for="">Password</label>
        <div class="show-password2">
               <input type="password"  id="" placeholder="Min. 6 characters">
               <div class="eye2" ><img src="images/close-eye.jfif" alt=""></div> 
        </div>

       
         <div class="checkbox2">
             <input type="checkbox">
             <p>I agree to the <span class="signup-span">Terms of Service </span>and <span class="signup-span">No-Refund Policy</span></p>
         </div>
    </div>
    <button class="create-account">Create Account</button>
    <div class="signup-line"></div>
    <p class="signup-root">Already  have an account? <a href="https://pedrollaverrissie.github.io/login/">Sign in</a></span></p>
              
</body>
</html>
